<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Picture Perfect Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    #panel {
      display: none;
    }

    h2 {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="panel">
    <h2>Upload New Work</h2>

    <input id="title" placeholder="Title">

    <select id="category">
      <option>Vinyl</option>
      <option>Bobo Balloons</option>
      <option>Boards</option>
      <option>Stickers</option>
      <option>Wedding Cards</option>
    </select>

    <input type="file" id="image">

    <button onclick="upload()">Upload</button>

    <p id="status"></p>
  </div>

</div>

<script src="admin.js"></script>

</body>
</html>
