<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Picture Perfect Creations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase (optional if auth used globally) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>

<body>

<!-- ================= HEADER (MATCHED ACROSS ALL PAGES) ================= -->
<header class="main-header">

  <h1 class="logo">Picture Perfect</h1>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button id="authBtn" class="login-btn" onclick="openAuth()">
    Sign in
  </button>

</header>

<!-- ================= HERO ================= -->
<section class="contact-hero">

  <h2>Let’s Create Something Amazing ✨</h2>
  <p>For orders & bookings, message us on Instagram</p>

  <a class="insta-btn"
     href="https://www.instagram.com/_pictureperfectcreations/"
     target="_blank">
    📩 Book via Instagram
  </a>

</section>

<!-- ================= CONTACT CARD ================= -->
<section class="contact-card">

  <h3>Send us a message</h3>

  <form name="contact" method="POST" data-netlify="true">

    <input type="hidden" name="form-name" value="contact">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your message..." required></textarea>

    <button type="submit">Send Message</button>

  </form>

  <p class="small-text">
    We usually reply within 24 hours
  </p>

</section>

</body>
</html>
