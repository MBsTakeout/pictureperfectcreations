<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<body>

<header>
  <h1>Contact & Bookings</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button onclick="toggleDarkMode()" class="dark-btn">🌙</button>
</header>

<!-- HERO SECTION -->
<section class="contact-hero">
  <h2>Let’s Create Something Amazing ✨</h2>
  <p>For all orders & bookings, please DM us on Instagram.</p>

  <!-- INSTAGRAM BOOKING BUTTON -->
  <a 
    href="https://www.instagram.com/_pictureperfectcreations/" 
    target="_blank"
    class="insta-btn"
  >
    📩 Book via Instagram DM
  </a>
</section>

<!-- CONTACT FORM -->
<section class="contact-card">

  <h3>Send us a message</h3>

 <form name="contact" method="POST" data-netlify="true">

  <!-- REQUIRED for Netlify detection -->
  <input type="hidden" name="form-name" value="contact" />

  <p>
    <label>Name</label>
    <input type="text" name="name" required />
  </p>

  <p>
    <label>Email</label>
    <input type="email" name="email" required />
  </p>

  <p>
    <label>How can we help?</label>
    <textarea name="message" placeholder="e.g. Vinyl design, balloons, wedding cards..." required></textarea>
  </p>

  <button type="submit">Send Message</button>

</form>

  <p class="small-text">
    💡 We usually reply within 24 hours
  </p>

</section>

<!-- FOOTER -->
<footer>
  © 2026 Picture Perfect Creations
</footer>

<script src="script.js"></script>

</body>
</html>
