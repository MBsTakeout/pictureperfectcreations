<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Picture Perfect Creations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase (optional if auth used globally) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>

<body>

<!-- ================= HEADER (MATCHED ACROSS ALL PAGES) ================= -->
<header class="main-header">

  <h1 class="logo">Picture Perfect</h1>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

 <!-- ================= FACEBOOK STYLE LOGIN ================= -->
<div id="authModal" class="auth-overlay">

  <div class="auth-box">

    <!-- LEFT SIDE -->
    <div class="auth-left">
      <h1>Picture Perfect</h1>
      <p>Luxury custom creations made simple.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">

      <input id="email" type="email" placeholder="Email address">
      <input id="password" type="password" placeholder="Password">

      <!-- MAIN ACTION BUTTON (changes between login/signup in JS) -->
      <button id="mainAuthBtn" class="login-main-btn" onclick="handleAuthAction()">
        Sign in
      </button>

      <!-- GOOGLE -->
      <button class="google-btn" onclick="googleLogin()">
        Continue with Google
      </button>

      <div class="auth-divider"></div>

      <!-- FORGOT PASSWORD -->
      <p class="auth-link" onclick="forgotPassword()">
        Forgot password?
      </p>

      <!-- SWITCH MODE -->
      <p id="switchText" class="auth-link" onclick="toggleAuthMode()">
        Create account
      </p>

      <p class="close-auth" onclick="closeAuth()">Close</p>

    </div>

  </div>

</div>


</header>

<!-- ================= HERO ================= -->
<section class="contact-hero">

  <h2>Let’s Create Something Amazing ✨</h2>
  <p>For orders & bookings, message us on Instagram</p>

  <a class="insta-btn"
     href="https://www.instagram.com/_pictureperfectcreations/"
     target="_blank">
    📩 Book via Instagram
  </a>

</section>

<!-- ================= CONTACT CARD ================= -->
<section class="contact-card">

  <h3>Send us a message</h3>

  <form name="contact" method="POST" data-netlify="true">

    <input type="hidden" name="form-name" value="contact">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Your message..." required></textarea>

    <button type="submit">Send Message</button>

  </form>

  <p class="small-text">
    We usually reply within 24 hours
  </p>

</section>

</body>
</html>
