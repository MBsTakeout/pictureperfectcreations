<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <h1>Contact & Bookings</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- ================= HERO ================= -->
<section class="contact-hero">
  <h2>Let’s Create Something Amazing ✨</h2>
  <p>Custom designs for every special moment</p>

  <a class="insta-btn"
     href="https://www.instagram.com/_pictureperfectcreations/"
     target="_blank">
    📩 Book via Instagram
  </a>
</section>

<!-- ================= CONTACT FORM ================= -->
<section class="contact-card">

  <h3>Send us a message</h3>

  <form name="contact" method="POST" data-netlify="true">

    <!-- Netlify required -->
    <input type="hidden" name="form-name" value="contact">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" placeholder="Tell us what you need..." required></textarea>

    <button type="submit">Send Message</button>

  </form>

  <p class="small-text">
    💬 We usually reply within 24 hours
  </p>

</section>

<!-- ================= FOOTER ================= -->
<footer style="text-align:center;padding:20px;opacity:0.7;">
  © 2026 Picture Perfect Creations
</footer>

<script src="script.js"></script>

</body>
</html>
