<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <h1>Gallery</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button id="authBtn" onclick="openAuth()" class="login-btn">Sign in</button>
</header>

<!-- ================= SEARCH ================= -->
<input id="searchInput" placeholder="Search creations..." class="search-bar">

<!-- ================= FILTERS ================= -->
<div class="filters">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('vinyl')">Vinyl</button>
  <button onclick="filterCategory('balloon')">Balloons</button>
  <button onclick="filterCategory('boards')">Boards</button>
  <button onclick="filterCategory('stickers')">Stickers</button>
  <button onclick="filterCategory('weddings')">Wedding</button>
</div>

<!-- ================= ADMIN + BUTTON ================= -->
<div id="addBtn" class="add-btn">+</div>

<div id="uploadBox" class="upload-box">

  <input id="title" placeholder="Title">

  <select id="category">
    <option value="vinyl">Vinyl</option>
    <option value="balloon">Balloon</option>
    <option value="boards">Boards</option>
    <option value="stickers">Stickers</option>
    <option value="weddings">Wedding</option>
  </select>

  <input type="file" id="file">

  <button onclick="uploadImage()">Upload</button>

</div>

<!-- ================= LOADING TEXT ================= -->
<p id="loadingText" style="text-align:center;">Loading gallery...</p>

<!-- ================= GALLERY ================= -->
<section class="gallery" id="gallery"></section>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="modal">
  <div class="modal-box">

    <h2>Sign in</h2>

    <button onclick="googleLogin()" class="google-btn">Continue with Google</button>

    <hr>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="emailLogin()">Sign in</button>
    <button onclick="emailSignup()">Create account</button>

    <p onclick="closeAuth()" style="cursor:pointer;">Close</p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
