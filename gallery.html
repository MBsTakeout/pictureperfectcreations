<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="main-header">
  <h1 class="logo">Picture Perfect</h1>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button id="authBtn" class="login-btn" onclick="openAuth()">
    Sign in
  </button>
</header>

<!-- ================= PAGE WRAPPER ================= -->
<section class="gallery-page">

  <!-- SEARCH -->
  <div style="text-align:center; margin-top:15px;">
    <input id="searchInput" placeholder="Search creations..."
    style="padding:10px; width:80%; max-width:400px; border-radius:10px; border:1px solid #ddd;">
  </div>

  <!-- FILTERS -->
  <div class="filters" style="text-align:center; margin-top:10px;">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('vinyl')">Vinyl</button>
    <button onclick="filterCategory('balloon')">Balloon</button>
    <button onclick="filterCategory('boards')">Boards</button>
    <button onclick="filterCategory('stickers')">Stickers</button>
    <button onclick="filterCategory('weddings')">Wedding</button>
  </div>

  <!-- LOADING -->
  <p id="loadingText" style="text-align:center;">Loading gallery...</p>

  <!-- GALLERY -->
  <section class="gallery" id="gallery"></section>

</section>

<!-- ================= ADMIN UPLOAD ================= -->
<div id="addBtn" class="add-btn">+</div>

<div id="uploadBox" class="upload-box">

  <input id="title" placeholder="Title">

  <select id="category">
    <option value="vinyl">Vinyl</option>
    <option value="balloon">Balloon</option>
    <option value="boards">Boards</option>
    <option value="stickers">Stickers</option>
    <option value="weddings">Wedding</option>
  </select>

  <input type="file" id="file">

  <button onclick="uploadImage()">Upload</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<!-- ================= FACEBOOK STYLE LOGIN ================= -->
<div id="authModal" class="auth-overlay">

  <div class="auth-box">

    <!-- LEFT SIDE -->
    <div class="auth-left">
      <h1>Picture Perfect</h1>
      <p>Luxury custom creations made simple.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">

      <input id="email" type="email" placeholder="Email address">
      <input id="password" type="password" placeholder="Password">

      <!-- MAIN ACTION BUTTON (changes between login/signup in JS) -->
      <button id="mainAuthBtn" class="login-main-btn" onclick="handleAuthAction()">
        Sign in
      </button>

      <!-- GOOGLE -->
      <button class="google-btn" onclick="googleLogin()">
        Continue with Google
      </button>

      <div class="auth-divider"></div>

      <!-- FORGOT PASSWORD -->
      <p class="auth-link" onclick="forgotPassword()">
        Forgot password?
      </p>

      <!-- SWITCH MODE -->
      <p id="switchText" class="auth-link" onclick="toggleAuthMode()">
        Create account
      </p>

      <p class="close-auth" onclick="closeAuth()">Close</p>

    </div>

  </div>

</div>


<script src="script.js"></script>

</body>
</html>
