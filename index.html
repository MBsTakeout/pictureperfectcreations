<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picture Perfect Creations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <h1>Picture Perfect Creations</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- PROFILE DROPDOWN -->
  <div class="profile-wrapper">

    <button id="authBtn" class="login-btn" onclick="openAuth()">
      Sign in
    </button>

    <div id="profileMenu" class="profile-menu">
      <button onclick="logout()">Log out</button>
    </div>

  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <div class="hero-card">
    <h2>Luxury Custom Creations</h2>
    <p>Vinyl • Balloons • Boards • Stickers • Wedding Cards</p>
    <a class="btn" href="gallery.html">View Gallery</a>
  </div>
</section>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="modal">
  <div class="modal-box">

    <h2>Welcome</h2>

    <button onclick="googleLogin()" class="google-btn">
      Continue with Google
    </button>

    <hr>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="emailLogin()">Sign in</button>
    <button onclick="emailSignup()">Create account</button>

    <p onclick="closeAuth()" style="cursor:pointer;">Close</p>

  </div>
</div>

<!-- ================= ADMIN UPLOAD ================= -->
<div id="addBtn" class="add-btn">+</div>

<div id="uploadBox" class="upload-box">
  <input id="title" placeholder="Title">

  <select id="category">
    <option value="vinyl">Vinyl</option>
    <option value="balloon">Balloon</option>
    <option value="boards">Boards</option>
    <option value="stickers">Stickers</option>
    <option value="weddings">Wedding</option>
  </select>

  <input type="file" id="file">

  <button onclick="uploadImage()">Upload</button>
</div>

<script src="script.js"></script>

</body>
</html>
