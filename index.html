<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picture Perfect Creations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- HEADER -->
<header>
  <h1>Picture Perfect Creations</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <button class="login-btn" onclick="openLogin()">Sign in</button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-card">
    <h2>✨ Luxury Custom Creations</h2>
    <p>Vinyl • Balloons • Boards • Stickers • Wedding Cards</p>
    <a href="gallery.html" class="btn">Explore Gallery</a>
  </div>
</section>

<!-- INFO -->
<section class="grid-info">
  <div class="info-card">🎨 Custom Designs</div>
  <div class="info-card">🎈 Event Decor</div>
  <div class="info-card">💌 Wedding Stationery</div>
  <div class="info-card">✨ Premium Quality</div>
</section>

<!-- GALLERY PREVIEW -->
<section class="gallery" id="gallery"></section>

<!-- ADMIN UPLOAD BUTTON -->
<div id="addBtn" class="add-btn">➕</div>

<!-- UPLOAD BOX -->
<div id="uploadBox" class="upload-box">
  <input type="text" id="title" placeholder="Title">

  <select id="category">
    <option>Vinyl</option>
    <option>Balloons</option>
    <option>Boards</option>
    <option>Stickers</option>
    <option>Wedding Cards</option>
  </select>

  <input type="file" id="file">

  <button onclick="uploadImage()">Upload</button>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imgModal" class="modal" onclick="closeImg()">
  <img id="modalImg">
</div>

<script src="script.js"></script>

</body>
</html>
