<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picture Perfect Creations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="main-header">

  <h1 class="logo">Picture Perfect</h1>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="profile-wrapper">

    <button id="authBtn" class="login-btn" onclick="openAuth()">Sign in</button>

    <button id="signupBtn" class="signup-mini" onclick="openAuth('signup')">
      Sign up
    </button>

    <div id="profileMenu" class="profile-menu">
      <button onclick="logout()">Log out</button>
    </div>

  </div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">

  <div class="hero-card">
    <h2>Luxury Custom Creations</h2>
    <p>Vinyl • Balloons • Boards • Stickers • Wedding Cards</p>
    <a class="btn" href="gallery.html">View Gallery</a>
  </div>

</section>

<!-- ================= FACEBOOK STYLE LOGIN ================= -->
<div id="authModal" class="auth-overlay">

  <div class="auth-box">

    <!-- LEFT -->
    <div class="auth-left">
      <h1>Picture Perfect</h1>
      <p>Luxury custom creations made simple.</p>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">

      <input id="email" type="email" placeholder="Email address">
      <input id="password" type="password" placeholder="Password">

      <button class="login-main-btn" onclick="emailLogin()">Log In</button>

      <button class="google-btn" onclick="googleLogin()">
        Continue with Google
      </button>

      <div class="auth-divider"></div>

      <button class="signup-btn" onclick="emailSignup()">
        Create new account
      </button>

      <p class="close-auth" onclick="closeAuth()">Close</p>

    </div>

  </div>

</div>

<!-- ================= ADMIN UPLOAD ================= -->
<div id="addBtn" class="add-btn">+</div>

<div id="uploadBox" class="upload-box">

  <input id="title" placeholder="Title">

  <select id="category">
    <option value="vinyl">Vinyl</option>
    <option value="balloon">Balloon</option>
    <option value="boards">Boards</option>
    <option value="stickers">Stickers</option>
    <option value="weddings">Wedding</option>
  </select>

  <input type="file" id="file">

  <button onclick="uploadImage()">Upload</button>

</div>

<script src="script.js"></script>

</body>
</html>
